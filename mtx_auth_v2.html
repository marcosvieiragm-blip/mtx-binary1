<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MTX Binary — Seu dinheiro trabalhando por você</title>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg-base: #09110e;
  --bg-surface: #120e06;
  --bg-card: #181006;
  --bg-card-hover: #1f1408;
  --bg-input: #140d05;
  --primary: #f97316;
  --primary-dim: #ea580c;
  --primary-glow: rgba(249,115,22,0.15);
  --primary-glow-strong: rgba(249,115,22,0.30);
  --accent: #fb923c;
  --text-primary: #fafafa;
  --text-secondary: #fed7aa;
  --text-muted: #c08050;
  --border: rgba(249,115,22,0.18);
  --border-strong: rgba(249,115,22,0.38);
  --radius: 14px;
  --radius-full: 9999px;
  --transition: 0.2s cubic-bezier(0.4,0,0.2,1);
  --gold: #f59e0b;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { color-scheme: dark; scroll-behavior: smooth; }
body {
  font-family: 'Geist', sans-serif;
  background: var(--bg-base);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
}
a { color: inherit; text-decoration: none; }
button { cursor: pointer; font-family: inherit; }
input, select { font-family: inherit; }

/* ─── LAYOUT ─── */
.page {
  display: grid;
  grid-template-columns: 1fr 1fr;
  min-height: 100vh;
}
@media (max-width: 900px) {
  .page { grid-template-columns: 1fr; }
  .right-panel { display: none; }
}

/* ─── LEFT — FORM SIDE ─── */
.left {
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 48px 40px;
  overflow: hidden;
  background: var(--bg-base);
}
.left::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse 120% 100% at 0% 0%, rgba(249,115,22,0.18) 0%, rgba(249,115,22,0.04) 40%, transparent 70%);
  pointer-events: none;
}
/* subtle grid texture */
.left::after {
  display: none;
}

.form-wrap {
  position: relative;
  width: 100%;
  max-width: 420px;
  z-index: 1;
}

/* Logo */
.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  justify-content: center;
  margin-bottom: 28px;
}
/* logo image styles handled inline */

/* Headline */
.headline {
  text-align: center;
  margin-bottom: 8px;
}
.headline h1 {
  font-size: 26px;
  font-weight: 800;
  line-height: 1.2;
  color: var(--text-primary);
  letter-spacing: -0.5px;
}
.headline h1 em {
  font-style: normal;
  color: var(--primary);
}
.headline p {
  margin-top: 6px;
  font-size: 13px;
  color: var(--text-muted);
}

/* Social proof strip */
.proof-strip {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin: 18px 0;
  padding: 12px 16px;
  background: rgba(249,115,22,0.06);
  border: 1px solid var(--border);
  border-radius: var(--radius);
}
.proof-item {
  text-align: center;
}
.proof-item strong {
  display: block;
  font-size: 15px;
  font-weight: 800;
  color: var(--primary);
  line-height: 1.1;
}
.proof-item span {
  font-size: 10px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.proof-sep {
  width: 1px;
  background: var(--border);
  align-self: stretch;
}

/* Tabs */
.tabs {
  display: flex;
  background: var(--bg-card);
  border-radius: var(--radius-full);
  padding: 4px;
  margin-bottom: 22px;
  border: 1px solid var(--border);
}
.tab {
  flex: 1;
  height: 38px;
  border-radius: var(--radius-full);
  border: none;
  background: transparent;
  color: var(--text-muted);
  font-size: 14px;
  font-weight: 600;
  transition: all var(--transition);
}
.tab.active {
  background: var(--primary);
  color: #fff;
  box-shadow: 0 2px 12px rgba(249,115,22,0.35);
}

/* Form groups */
.form-group { margin-bottom: 14px; }
.form-label {
  display: block;
  font-size: 11px;
  font-weight: 600;
  color: var(--text-muted);
  margin-bottom: 6px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.label-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 6px;
}
.label-row span { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
.label-row a { font-size: 12px; color: var(--primary); }
.label-row a:hover { color: var(--accent); }

.input-wrap {
  position: relative;
  display: flex;
  align-items: center;
  height: 48px;
  border-radius: var(--radius-full);
  border: 1px solid var(--border);
  background: var(--bg-input);
  transition: border-color var(--transition), box-shadow var(--transition);
  overflow: hidden;
}
.input-wrap:focus-within {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px var(--primary-glow);
}
.input-icon {
  position: absolute;
  left: 16px;
  color: var(--primary);
  display: flex; align-items: center;
  pointer-events: none;
  z-index: 1;
}
.input-icon-right {
  position: absolute;
  right: 16px;
  color: var(--text-muted);
  display: flex; align-items: center;
  background: none; border: none;
  z-index: 1;
}
.input-wrap input {
  position: absolute;
  inset: 0; width: 100%; height: 100%;
  padding: 0 48px;
  background: transparent; border: none; outline: none;
  color: var(--text-primary); font-size: 14px;
}
.input-wrap input::placeholder { color: var(--text-muted); }

/* Checkbox */
.checkbox-row { display: flex; align-items: flex-start; gap: 10px; margin: 12px 0; }
.checkbox-row input[type=checkbox] {
  width: 16px; height: 16px; margin-top: 2px;
  accent-color: var(--primary); cursor: pointer; flex-shrink: 0;
}
.checkbox-row label { font-size: 12px; color: var(--text-muted); cursor: pointer; line-height: 1.4; }
.checkbox-row label a { color: var(--primary); }

/* CTA Button */
.btn-primary {
  position: relative;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  width: 100%; height: 52px;
  border-radius: var(--radius);
  background: linear-gradient(135deg, #f97316, #ea580c);
  border: 1px solid rgba(255,255,255,0.15);
  color: #fff;
  font-weight: 800; font-size: 15px; letter-spacing: 0.3px;
  transition: all var(--transition);
  overflow: hidden;
  margin-top: 16px;
  box-shadow: 0 4px 20px rgba(249,115,22,0.4);
}
.btn-primary::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(to bottom, rgba(255,255,255,0.18), transparent 50%);
  pointer-events: none;
}
.btn-primary:hover {
  background: linear-gradient(135deg, #fb923c, #f97316);
  box-shadow: 0 6px 28px rgba(249,115,22,0.55);
  transform: translateY(-1px);
}
.btn-primary:active { transform: translateY(0); }

.urgency-badge {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  margin-top: 10px;
  font-size: 12px;
  color: var(--gold);
  font-weight: 600;
}
.urgency-badge span.dot {
  width: 6px; height: 6px;
  background: var(--gold);
  border-radius: 50%;
  animation: pulse-dot 1.5s ease-in-out infinite;
}
@keyframes pulse-dot {
  0%,100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.4; transform: scale(0.7); }
}

/* Security seals */
.security-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 14px;
  margin-top: 20px;
  padding-top: 16px;
  border-top: 1px solid var(--border);
}
.seal {
  display: flex; align-items: center; gap: 5px;
  font-size: 11px; color: var(--text-muted); font-weight: 500;
}
.seal svg { color: var(--primary); flex-shrink: 0; }

/* Divider */
.divider {
  display: flex; align-items: center; gap: 10px;
  margin: 16px 0; color: var(--text-muted); font-size: 12px;
}
.divider::before, .divider::after {
  content: ''; flex: 1;
  height: 1px; background: var(--border);
}

/* Switch link */
.switch-link {
  text-align: center;
  font-size: 13px;
  color: var(--text-muted);
  margin-top: 18px;
}
.switch-link a { color: var(--primary); font-weight: 600; }

/* ─── RIGHT PANEL ─── */
.right-panel {
  position: relative;
  display: flex;
  flex-direction: column;
  justify-content: center;
  overflow: hidden;
  background: var(--bg-surface);
  border-left: 1px solid var(--border);
}

/* Dark gradient overlay */
.right-panel::before {
  content: '';
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 80% 60% at 80% 20%, rgba(249,115,22,0.22) 0%, transparent 60%),
    radial-gradient(ellipse 60% 50% at 20% 80%, rgba(249,115,22,0.12) 0%, transparent 60%),
    linear-gradient(160deg, #1a0d00 0%, #09110e 50%, #0d1209 100%);
  z-index: 0;
}
/* Grid pattern */
.right-panel::after {
  display: none;
}

.panel-content {
  position: relative;
  z-index: 1;
  padding: 56px 48px;
  display: flex;
  flex-direction: column;
  gap: 32px;
}

/* Tagline */
.panel-tagline {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  font-weight: 700;
  color: var(--primary);
  text-transform: uppercase;
  letter-spacing: 1.5px;
}
.panel-tagline::before {
  content: '';
  width: 24px; height: 2px;
  background: var(--primary);
  border-radius: 2px;
}

.panel-headline {
  font-size: 36px;
  font-weight: 900;
  line-height: 1.15;
  letter-spacing: -1px;
  color: var(--text-primary);
}
.panel-headline em {
  font-style: normal;
  background: linear-gradient(90deg, #f97316, #fbbf24);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.panel-sub {
  font-size: 15px;
  color: var(--text-muted);
  line-height: 1.6;
  margin-top: -16px;
}

/* Stats grid */
.stats-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}
.stat-card {
  background: rgba(249,115,22,0.07);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 18px;
  transition: border-color var(--transition), background var(--transition);
}
.stat-card:hover {
  border-color: var(--border-strong);
  background: rgba(249,115,22,0.11);
}
.stat-card-icon {
  width: 32px; height: 32px;
  background: rgba(249,115,22,0.12);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 10px;
  color: var(--primary);
}
.stat-card strong {
  display: block;
  font-size: 22px;
  font-weight: 900;
  color: var(--text-primary);
  letter-spacing: -0.5px;
  line-height: 1;
}
.stat-card span {
  font-size: 11px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-top: 4px;
  display: block;
}

/* Benefits list */
.benefits {
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.benefit {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 16px;
  background: rgba(249,115,22,0.06);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  transition: border-color var(--transition);
}
.benefit:hover { border-color: var(--border-strong); }
.benefit-icon {
  width: 36px; height: 36px; flex-shrink: 0;
  background: rgba(249,115,22,0.12);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  color: var(--primary);
}
.benefit-body strong {
  display: block; font-size: 14px; font-weight: 700; color: var(--text-primary);
}
.benefit-body span {
  font-size: 12px; color: var(--text-muted);
}

/* Testimonials */
.testimonials { display: flex; flex-direction: column; gap: 10px; }
.testimonial {
  background: rgba(249,115,22,0.05);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
}
.testimonial-header {
  display: flex; align-items: center; gap: 10px; margin-bottom: 8px;
}
.avatar {
  width: 32px; height: 32px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700; color: #fff;
  flex-shrink: 0;
}
.testimonial-meta strong {
  display: block; font-size: 13px; font-weight: 700; color: var(--text-primary);
}
.testimonial-meta span {
  font-size: 11px; color: var(--text-muted);
}
.stars { color: var(--gold); font-size: 12px; margin-left: auto; }
.testimonial p {
  font-size: 13px; color: var(--text-secondary); line-height: 1.5;
}

/* Trust bar */
.trust-bar {
  display: flex; align-items: center; gap: 8px;
  padding: 12px 16px;
  background: rgba(249,115,22,0.06);
  border: 1px solid var(--border);
  border-radius: var(--radius);
}
.trust-bar svg { color: var(--primary); flex-shrink: 0; }
.trust-bar p {
  font-size: 12px; color: var(--text-muted); line-height: 1.4;
}
.trust-bar p strong { color: var(--text-secondary); }

/* Live activity ticker */
.ticker {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 14px;
  background: rgba(34,197,94,0.07);
  border: 1px solid rgba(34,197,94,0.2);
  border-radius: var(--radius-full);
  font-size: 12px;
  color: #86efac;
  font-weight: 500;
  width: fit-content;
  white-space: nowrap;
}
.ticker-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: #22c55e;
  animation: pulse-dot 1.5s ease-in-out infinite;
}

/* Register-only fields */
.register-only { display: none; }
.register-only.show { display: block; }

/* Scrollbar */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--bg-base); }
::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 2px; }

/* Animations */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}
.form-wrap { animation: fadeUp 0.5s ease both; }
.panel-content { animation: fadeUp 0.6s 0.1s ease both; }

/* ─── LANGUAGE SWITCHER ─── */
.lang-switcher {
  position: fixed;
  top: 16px;
  right: auto;
  left: 20px;
  z-index: 999;
  display: flex;
  align-items: center;
  gap: 4px;
  background: rgba(9,17,14,0.88);
  border: 1px solid var(--border);
  border-radius: var(--radius-full);
  padding: 4px 6px;
  backdrop-filter: blur(10px);
}
.lang-btn {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 5px 10px;
  border-radius: var(--radius-full);
  border: none;
  background: transparent;
  color: var(--text-muted);
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: all var(--transition);
  letter-spacing: 0.3px;
}
.lang-btn .flag { font-size: 15px; line-height: 1; }
.lang-btn:hover { color: var(--text-primary); background: rgba(249,115,22,0.08); }
.lang-btn.active {
  background: var(--primary);
  color: #fff;
  box-shadow: 0 2px 8px rgba(249,115,22,0.35);
}
</style>
  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyC_Dm-x8z3e3vaTm5fntQ-XCNPO5S09C78",
      authDomain: "ftxb-26aea.firebaseapp.com",
      projectId: "ftxb-26aea",
      storageBucket: "ftxb-26aea.firebasestorage.app",
      messagingSenderId: "1059501522296",
      appId: "1:1059501522296:web:24c4bc189ee38bda951c8d"
    };

    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db   = getFirestore(app);

    // ── Error messages ──────────────────────────────────
    const errMsg = {
      'auth/email-already-in-use':   { pt:'Este e-mail já está cadastrado.',           en:'This email is already registered.',          es:'Este correo ya está registrado.' },
      'auth/invalid-email':          { pt:'E-mail inválido.',                          en:'Invalid email address.',                     es:'Correo electrónico inválido.' },
      'auth/weak-password':          { pt:'Senha fraca. Use ao menos 6 caracteres.',   en:'Weak password. Use at least 6 characters.',  es:'Contraseña débil. Usa al menos 6 caracteres.' },
      'auth/user-not-found':         { pt:'Usuário não encontrado.',                   en:'User not found.',                            es:'Usuario no encontrado.' },
      'auth/wrong-password':         { pt:'Senha incorreta.',                          en:'Incorrect password.',                        es:'Contraseña incorrecta.' },
      'auth/invalid-credential':     { pt:'E-mail ou senha incorretos.',               en:'Invalid email or password.',                 es:'Correo o contraseña incorrectos.' },
      'auth/too-many-requests':      { pt:'Muitas tentativas. Tente novamente mais tarde.', en:'Too many attempts. Try again later.',    es:'Demasiados intentos. Intenta más tarde.' },
      'auth/network-request-failed': { pt:'Erro de conexão. Verifique sua internet.',  en:'Connection error. Check your internet.',     es:'Error de conexión. Verifica tu internet.' },
    };

    function getErrMsg(code) {
      const lang = window.currentLang || 'pt';
      const entry = errMsg[code];
      return entry ? entry[lang] : (lang === 'pt' ? 'Ocorreu um erro. Tente novamente.' : lang === 'en' ? 'An error occurred. Try again.' : 'Ocurrió un error. Inténtalo de nuevo.');
    }

    function showFormError(msg) {
      let el = document.getElementById('form-error');
      if (!el) {
        el = document.createElement('div');
        el.id = 'form-error';
        el.style.cssText = 'margin-top:12px;padding:10px 14px;background:rgba(239,68,68,0.12);border:1px solid rgba(239,68,68,0.35);border-radius:10px;font-size:13px;color:#fca5a5;text-align:center;';
        document.querySelector('.btn-primary').after(el);
      }
      el.textContent = msg;
      el.style.display = 'block';
    }

    function hideFormError() {
      const el = document.getElementById('form-error');
      if (el) el.style.display = 'none';
    }

    function setLoading(loading) {
      const btn   = document.getElementById('cta-btn');
      const label = document.getElementById('cta-label');
      const t     = window.i18n ? window.i18n[window.currentLang || 'pt'] : {};
      const tab   = window.currentTab || 'login';
      btn.disabled    = loading;
      btn.style.opacity = loading ? '0.7' : '1';
      if (loading) {
        label.textContent = tab === 'login' ? (t.submitting || 'Entrando…') : (t.submittingReg || 'Criando conta…');
      } else {
        label.textContent = tab === 'login' ? (t.ctaLogin || 'Entrar') : (t.ctaRegister || 'Criar conta');
      }
    }

    // ── SUBMIT HANDLER (overrides the old one) ──────────
    document.getElementById('auth-form').addEventListener('submit', async function(e) {
      e.preventDefault();
      hideFormError();

      const tab   = window.currentTab || 'login';
      const email = document.querySelector('input[type="email"]').value.trim();
      const pw    = document.getElementById('pw-input').value;

      setLoading(true);

      try {
        if (tab === 'register') {
          // ── CREATE ACCOUNT ──
          const name  = document.querySelector('#field-name input').value.trim();
          const phone = document.querySelector('#field-phone input').value.trim();
          const confirmPw = document.querySelector('#field-confirm input').value;

          if (!name)  { showFormError(window.currentLang==='en'?'Enter your full name.':window.currentLang==='es'?'Ingresa tu nombre completo.':'Digite seu nome completo.'); setLoading(false); return; }
          if (pw !== confirmPw) { showFormError(window.currentLang==='en'?'Passwords do not match.':window.currentLang==='es'?'Las contraseñas no coinciden.':'As senhas não coincidem.'); setLoading(false); return; }

          const cred = await createUserWithEmailAndPassword(auth, email, pw);

          // Save extra data to Firestore
          await setDoc(doc(db, 'users', cred.user.uid), {
            name, email, phone,
            createdAt: serverTimestamp(),
            saldo: 0,
            status: 'ativo'
          });

          showWelcome(name);

        } else {
          // ── LOGIN ──
          await signInWithEmailAndPassword(auth, email, pw);
          showWelcome('');
        }

      } catch (err) {
        showFormError(getErrMsg(err.code));
        setLoading(false);
      }
    });

    // ── FORGOT PASSWORD ──────────────────────────────────
    document.getElementById('forgot-link').addEventListener('click', async function(e) {
      e.preventDefault();
      const email = document.querySelector('input[type="email"]').value.trim();
      const lang  = window.currentLang || 'pt';
      if (!email) {
        showFormError(lang==='en'?'Enter your email first.':lang==='es'?'Ingresa tu correo primero.':'Digite seu e-mail primeiro.');
        return;
      }
      try {
        await sendPasswordResetEmail(auth, email);
        hideFormError();
        let el = document.getElementById('form-error');
        if (!el) { el = document.createElement('div'); el.id='form-error'; document.querySelector('.btn-primary').after(el); }
        el.style.cssText = 'margin-top:12px;padding:10px 14px;background:rgba(34,197,94,0.12);border:1px solid rgba(34,197,94,0.3);border-radius:10px;font-size:13px;color:#86efac;text-align:center;display:block;';
        el.textContent = lang==='en'?'Recovery email sent! Check your inbox.':lang==='es'?'¡Correo de recuperación enviado!':'E-mail de recuperação enviado! Verifique sua caixa.';
      } catch(err) {
        showFormError(getErrMsg(err.code));
      }
    });

    function showWelcome(name) {
      const overlay = document.createElement('div');
      overlay.style.cssText = 'position:fixed;inset:0;background:rgba(9,17,14,0.96);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;animation:fadeUp 0.4s ease both;';
      overlay.innerHTML = `
        <div style="width:64px;height:64px;background:linear-gradient(135deg,#f97316,#ea580c);border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 0 32px rgba(249,115,22,0.5);margin-bottom:24px;">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <h2 style="font-family:Geist,sans-serif;font-size:26px;font-weight:800;color:#fafafa;margin-bottom:8px;">${name ? 'Bem-vindo, '+name+'!' : 'Login realizado!'}</h2>
        <p style="color:#c08050;font-size:14px;">Redirecionando para o painel…</p>
        <div style="margin-top:32px;width:48px;height:3px;background:rgba(249,115,22,0.2);border-radius:2px;overflow:hidden;">
          <div style="height:100%;background:#f97316;animation:progress 1.8s ease forwards;border-radius:2px;"></div>
        </div>
        <style>@keyframes progress{from{width:0}to{width:100%}}</style>
      `;
      document.body.appendChild(overlay);
      setTimeout(() => { window.location.href = 'dashboard.html'; }, 2000);
      setTimeout(() => { overlay.remove(); setLoading(false); }, 2200);
    }

  </script>

let currentLang = 'pt';
let currentTab  = 'login';
window.currentTab  = currentTab;
window.currentLang = 'pt';

function setLang(lang) {
  currentLang = lang;
  const t = i18n[lang];

  // Highlight active button
  document.querySelectorAll('.lang-btn').forEach(function(btn) {
    btn.classList.toggle('active', btn.getAttribute('data-lang') === lang);
  });

  // Apply text translations
  document.querySelectorAll('[data-i18n]').forEach(function(el) {
    var key = el.getAttribute('data-i18n');
    if (t[key] === undefined) return;
    if (key === 'headline' || key === 'panelHeadline') {
      el.innerHTML = t[key];
    } else {
      el.textContent = t[key];
    }
  });

  // Apply HTML translations
  document.querySelectorAll('[data-i18n-html]').forEach(function(el) {
    var key = el.getAttribute('data-i18n-html');
    if (t[key] !== undefined) el.innerHTML = t[key];
  });

  // CTA button
  var cta = document.getElementById('cta-label');
  if (cta) cta.textContent = currentTab === 'login' ? t.ctaLogin : t.ctaRegister;

  // Switch link
  var sw = document.getElementById('switch-text');
  if (sw) sw.innerHTML = currentTab === 'login' ? t.switchLogin : t.switchRegister;

  // Forgot link
  var forgot = document.getElementById('forgot-link');
  if (forgot) forgot.textContent = t.forgotPw;

  // Traded value — convert BRL 4.2M to USD or EUR
  var tradedEl = document.getElementById('traded-value');
  if (tradedEl) {
    if (lang === 'pt') tradedEl.textContent = 'R$ 4,2M';
    else if (lang === 'en') tradedEl.textContent = '$ 0,8M';  // ~R$4.2M ÷ 5.20
    else if (lang === 'es') tradedEl.textContent = '€ 0,7M';  // ~R$4.2M ÷ 5.85
  }
}

function switchTab(tab) {
  currentTab = tab;
  window.currentTab = tab;
  var t = i18n[currentLang];

  document.getElementById('tab-login').classList.toggle('active', tab === 'login');
  document.getElementById('tab-register').classList.toggle('active', tab === 'register');

  document.querySelectorAll('.register-only').forEach(function(el) {
    el.classList.toggle('show', tab === 'register');
  });

  var cta = document.getElementById('cta-label');
  if (cta) cta.textContent = tab === 'login' ? t.ctaLogin : t.ctaRegister;

  var forgot = document.getElementById('forgot-link');
  if (forgot) forgot.style.display = tab === 'login' ? 'inline' : 'none';

  var sw = document.getElementById('switch-text');
  if (sw) sw.innerHTML = tab === 'login' ? t.switchLogin : t.switchRegister;
}

function togglePw() {
  var inp = document.getElementById('pw-input');
  inp.type = inp.type === 'password' ? 'text' : 'password';
}

// handleSubmit handled by Firebase module above

// Live ticker
(function() {
  var base = 1243;
  var el = document.getElementById('live-count');
  if (!el) return;
  function tick() {
    var delta = Math.floor(Math.random() * 5) + 1;
    var sign = Math.random() > 0.45 ? 1 : -1;
    base = Math.max(1100, Math.min(1500, base + sign * delta));
    el.textContent = base.toLocaleString('pt-BR');
    setTimeout(tick, 1500 + Math.random() * 2500);
  }
  setTimeout(tick, 2000);
})();

// Init
setLang('pt');
